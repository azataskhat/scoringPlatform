services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: iot-security-db
    environment:
      POSTGRES_DB: ${DB_NAME:-iot_security}
      POSTGRES_USER: ${DB_USER:-iot_app}
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS must be set in .env}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-iot_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: iot-security-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-iot_security}
      DB_USER: ${DB_USER:-iot_app}
      DB_PASS: ${DB_PASS:?DB_PASS must be set in .env}
      API_KEY: ${API_KEY:?API_KEY must be set in .env}
    depends_on:
      postgres:
        condition: service_healthy

  data-collector:
    build: ./data_collector
    container_name: iot-security-collector
    environment:
      BACKEND_URL: http://backend:8080
      API_KEY: ${API_KEY:?API_KEY must be set in .env}
      SHODAN_API_KEY: ${SHODAN_API_KEY:-}
      CENSYS_API_ID: ${CENSYS_API_ID:-}
      CENSYS_API_SECRET: ${CENSYS_API_SECRET:-}
      GREYNOISE_API_KEY: ${GREYNOISE_API_KEY:-}
      NVD_API_KEY: ${NVD_API_KEY:-}
    depends_on:
      - backend

  frontend:
    build: ./frontend
    container_name: iot-security-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
